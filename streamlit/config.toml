[theme]
base = "dark"
backgroundColor         = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor               = "#e6edf3"
primaryColor            = "#00d4ff"
font                    = "monospace"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true
port                = 8501

[browser]
gatherUsageStats = false

[logger]
level = "warning"
