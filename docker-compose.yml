services:

  # ── NexusOSINT FastAPI backend ──────────────────────────────────────────
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-osint
    restart: unless-stopped
    stop_grace_period: 35s
    working_dir: /app
    # SEC-HIGH-2 (2026-04-23): --proxy-headers + --forwarded-allow-ips faz
    # uvicorn ler X-Forwarded-For do nginx (rede interna 172.16/12) para
    # popular request.client.host. Sem isso, slowapi ratelimit agrupa
    # todos os usuários no mesmo bucket (IP do container nginx).
    command: >
      uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 1
        --timeout-graceful-shutdown 30
        --proxy-headers
        --forwarded-allow-ips=172.16.0.0/12
    environment:
      - OATHNET_API_KEY=${OATHNET_API_KEY}
      - SPIDERFOOT_URL=http://spiderfoot:5001
      - APP_PASSWORD=${APP_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://nexusosint.uk}
      - LOG_LEVEL=WARNING
      - PYTHONPATH=/app
      - ENV=prod
    volumes:
      - nexus_data:/app/data
      - /root/nexus-osint/api:/app/api:ro
      - /root/nexus-osint/static:/app/static:ro
      - /root/nexus-osint/modules:/app/modules:ro
    # SEC-HIGH-1 (2026-04-23): porta 8000 NÃO publicada no host.
    # Nginx alcança via rede interna Docker DNS (http://nexus:8000).
    # Publicar no host bypassa nginx (CSP, HSTS, rate_limit) e UFW é
    # ineficaz no Docker (regra DNAT em PREROUTING não passa pelo INPUT).
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 800m
        reservations:
          memory: 200m
    mem_swappiness: 10
    memswap_limit: 2800m
    networks:
      - internal

  # ── Nginx reverse proxy + SSL ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/nexus-osint/nginx.conf:/etc/nginx/nginx.conf:ro
      - /root/nexus-osint/static:/etc/nginx/static:ro
      - certbot_www:/var/www/certbot:ro
      - /root/nexus-osint/certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - nexus
    networks:
      - internal
      - external

  # ── Certbot (Let's Encrypt auto-renewal) ──────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: nexus-certbot
    security_opt:
      - no-new-privileges:true
    volumes:
      - certbot_www:/var/www/certbot
      - /root/nexus-osint/certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  nexus_data:
    driver: local
  certbot_www:
    driver: local

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
