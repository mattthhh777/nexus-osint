services:

  # ── NexusOSINT FastAPI backend ──────────────────────────────────────────
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-osint
    restart: unless-stopped
    environment:
      - OATHNET_API_KEY=${OATHNET_API_KEY:?Set OATHNET_API_KEY in .env}
      - SPIDERFOOT_URL=http://spiderfoot:5001
      - APP_PASSWORD=${APP_PASSWORD:-}
      - LOG_LEVEL=WARNING
    volumes:
      - nexus_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx reverse proxy + SSL ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - nexus

  # ── Certbot (Let's Encrypt) ────────────────────────────────────────────
  # Runs once to issue cert, then periodically to renew
  certbot:
    image: certbot/certbot:latest
    container_name: nexus-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Override entrypoint to keep container running for renewal
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  nexus_data:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local