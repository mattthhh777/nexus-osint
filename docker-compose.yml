version: "3.9"

services:

  # ── NexusOSINT FastAPI backend ──────────────────────────
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-osint
    restart: unless-stopped
    environment:
      - OATHNET_API_KEY=${OATHNET_API_KEY:?Set OATHNET_API_KEY in .env}
      - SPIDERFOOT_URL=http://spiderfoot:5001
      - APP_PASSWORD=${APP_PASSWORD:-}
      - LOG_LEVEL=WARNING
    volumes:
      - nexus_data:/app/data
    depends_on:
      - spiderfoot
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── SpiderFoot OSINT engine ─────────────────────────────
  spiderfoot:
    image: smicallef/spiderfoot:latest
    container_name: spiderfoot
    restart: unless-stopped
    # Only accessible internally — not exposed to internet
    expose:
      - "5001"
    volumes:
      - spiderfoot_data:/var/lib/spiderfoot
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Nginx reverse proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - nexus
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s

volumes:
  nexus_data:
    driver: local
  spiderfoot_data:
    driver: local
  nginx_certs:
    driver: local